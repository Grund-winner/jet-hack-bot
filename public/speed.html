<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Course Auto Prédiction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
      font-family: 'Poppins', sans-serif;
    }

    /* 🔵 BOUTON RETOUR */
    #back-btn{
      position:absolute;
      top:15px;
      left:15px;
      padding:10px 18px;
      background-color:#00aaff;
      color:white;
      font-size:16px;
      font-weight:600;
      border:none;
      border-radius:30px;
      cursor:pointer;
      z-index:5;
      text-decoration:none;
    }

    #back-btn:active{
      transform:scale(0.95);
    }

    #loader {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: black;
      z-index: 10;
    }

    #sprite {
      max-width: 100%;
      height: auto;
    }

    #progress-bar-container {
      width: 80%;
      height: 10px;
      background-color: rgba(255, 255, 255, 0.2);
      margin-top: 20px;
      border-radius: 5px;
      overflow: hidden;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background-color: #00aaff;
    }

    #hack-text {
      color: #00aaff;
      font-size: 24px;
      font-weight: 600;
      margin-top: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #main {
      display: none;
      width: 100%;
      height: 100%;
      background: url('bg.webp') no-repeat center top;
      background-size: contain;
      position: relative;
    }

    #top-banner {
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 1;
    }

    .dashed-vertical {
      position: absolute;
      top: 120px;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 3px dashed white;
    }

    #limit-line {
      position: absolute;
      bottom: 80px;
      width: 100%;
      height: 3px;
      background-color: white;
    }

    .car {
      position: absolute;
      bottom: 30px;
      z-index: 2;
    }

    #car-blue {
      left: 25%;
      transform: translateX(-50%);
    }

    #car-orange {
      left: 75%;
      transform: translateX(-50%);
    }

    #predict-button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      background-color: #00aaff;
      color: white;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      z-index: 3;
    }

    #predict-button:disabled {
      background-color: grey;
    }

    #result {
      display: none;
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      z-index: 4;
    }

    .blue-text { color: #00aaff; }
    .orange-text { color: orange; }
  </style>
</head>

<body>

<!-- 🔵 BOUTON RETOUR -->
<a href="index.html" id="back-btn">← Retour</a>

<div id="loader">
  <img id="sprite" src="https://1play.gamedev-tech.cc/speed/assets/sprite.webp">
  <div id="progress-bar-container">
    <div id="progress-bar"></div>
  </div>
  <div id="hack-text">HACK BY EURO54</div>
</div>

<div id="main">
  <img id="top-banner" src="./Course Auto Prédiction_files/3ea2c160f1cf3454730186448cea8701.webp">
  <div class="dashed-vertical"></div>
  <div id="limit-line"></div>

  <img id="car-blue" class="car" src="./Course Auto Prédiction_files/a188b65b5302adf3b24bb086acc7e899.webp">
  <img id="car-orange" class="car" src="./Course Auto Prédiction_files/e3266c56fd680c23368f6cef2521b519.webp">

  <button id="predict-button">Prédire</button>
  <div id="result"></div>
</div>

<script>
let progress = 0;
const interval = setInterval(() => {
  progress++;
  document.getElementById("progress-bar").style.width = progress + "%";
  if (progress >= 100) {
    clearInterval(interval);
    document.getElementById("loader").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
}, 80);

const carBlue = document.getElementById("car-blue");
const carOrange = document.getElementById("car-orange");
const predictBtn = document.getElementById("predict-button");
const result = document.getElementById("result");

predictBtn.onclick = () => {
  predictBtn.disabled = true;

  const winner = Math.random() < 0.5 ? 'blue' : 'orange';
  const winnerCar = winner === 'blue' ? carBlue : carOrange;
  const loserCar = winner === 'blue' ? carOrange : carBlue;

  winnerCar.style.bottom = "90%";
  loserCar.style.bottom = "70%";

  setTimeout(() => {
    const cote = (Math.random() * (7.99 - 1.01) + 1.01).toFixed(2);
    const textColorClass = winner === 'blue' ? 'blue-text' : 'orange-text';

    result.innerHTML = `<span class="${textColorClass}">${cote}x</span>`;
    result.style.display = "block";

    setTimeout(() => {
      carBlue.style.bottom = "30px";
      carOrange.style.bottom = "30px";
      result.style.display = "none";
      predictBtn.disabled = false;
    }, 4000);

  }, 2500);
};
</script>

</body>
</html>
