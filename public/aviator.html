<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Course Orange</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: url('bg.jpg') no-repeat center center/cover;
      font-family: Arial, sans-serif;
    }

    /* 🔴 BOUTON RETOUR */
    #back-btn{
      position:absolute;
      top:15px;
      left:15px;
      width:40px;
      height:40px;
      background:red;
      color:#fff;
      font-size:22px;
      font-weight:bold;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      z-index:20;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }

    #back-btn:active{
      transform:scale(0.9);
    }

    #loader {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #loader img {
      width: 150px;
    }

    #progress-bar-container {
      width: 80%;
      height: 10px;
      background-color: rgba(255, 255, 255, 0.2);
      margin-top: 20px;
      border-radius: 5px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background-color: blanchedalmond;
      transition: width 0.1s;
    }

    #hack-text {
      color: blanchedalmond;
      font-size: 32px;
      margin-top: 30px;
      text-shadow: 1px 1px 4px #000;
    }

    #main {
      display: none;
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #top-image {
      position: absolute;
      top: 0.4cm;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      z-index: 1;
    }

    #result {
      position: absolute;
      bottom: calc(42% + 220px);
      left: 50%;
      transform: translateX(-50%);
      color: bisque;
      font-size: 56px;
      font-weight: bold;
      z-index: 3;
    }

    #car-container {
      position: absolute;
      left: 50%;
      bottom: 42%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: moveUpDown 2s infinite ease-in-out;
    }

    @keyframes moveUpDown {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-30px); }
    }

    #car {
      width: 200px;
      z-index: 2;
    }

    #predict-button {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 25px;
      background-color: rgb(223, 46, 46);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      z-index: 2;
    }

    #predict-button:disabled {
      background-color: gray;
      cursor: not-allowed;
    }

    #bottom-decor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 160px;
      background-size: contain;
      z-index: 1;
    }
  </style>
</head>

<body>

<!-- 🔴 BOUTON RETOUR -->
<a href="index.html" id="back-btn">←</a>

<div id="loader">
  <img src="logo.svg" alt="Chargement">
  <div id="progress-bar-container">
    <div id="progress-bar"></div>
  </div>
  <div id="hack-text">HACK BY EURO54</div>
</div>

<div id="main">
  <img id="top-image" src="https://v1.bundlecdn.com/img/aviator-game-logo.2fb50dc03.svg" alt="Top Image">

  <div id="result"><span id="cote">1.00</span>x</div>

  <div id="car-container">
    <img id="car" src="plane.svg" alt="Voiture Orange">
  </div>

  <button id="predict-button">Prédire</button>
  <div id="bottom-decor"></div>
</div>

<script>
  const loader = document.getElementById("loader");
  const main = document.getElementById("main");
  const progressBar = document.getElementById("progress-bar");
  const predictBtn = document.getElementById("predict-button");
  const coteSpan = document.getElementById("cote");

  let progress = 0;
  const loadingInterval = setInterval(() => {
    progress += 2;
    progressBar.style.width = progress + "%";
    if (progress >= 100) {
      clearInterval(loadingInterval);
      loader.style.display = "none";
      main.style.display = "block";
    }
  }, 80);

  predictBtn.onclick = () => {
    predictBtn.disabled = true;

    let random = Math.random();
    let maxCote;

    if (random <= 0.95) {
      maxCote = (Math.random() * (4.55 - 1.01) + 1.01);
    } else if (random <= 0.99) {
      maxCote = (Math.random() * (21.54 - 4.56) + 4.56);
    } else {
      maxCote = (Math.random() * (39.99 - 21.55) + 21.55);
    }

    maxCote = maxCote.toFixed(2);
    coteSpan.innerText = maxCote;

    const duration = Math.random() * 4 + 5;
    setTimeout(() => {
      predictBtn.disabled = false;
    }, duration * 1000 + 1000);
  };
</script>

</body>
</html>
